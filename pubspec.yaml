name: calc_architect
description: Production‑ready calculator with memory, scientific functions, haptics, sound, and adaptive UI.
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  sqflite: ^2.4.2
  path: ^1.9.1
  decimal: ^3.2.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  rxdart: ^0.28.0
  shimmer: ^3.0.0
#  glassmorphism: ^3.0.0          # Correct version
  shared_preferences: ^2.5.4
  haptic_feedback: ^0.6.4+3      # Correct package name
  audioplayers: ^6.5.1
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  logging: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
    - assets/sounds/